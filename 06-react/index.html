<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio - React Version</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const App = () => {
      const [expandedProject, setExpandedProject] = useState(null);
      const [formData, setFormData] = useState({ email: '', message: '' });
      const [successMessage, setSuccessMessage] = useState(false);
      const [activeNav, setActiveNav] = useState('about');

      const skills = ['HTML', 'CSS', 'JavaScript', 'React'];
      
      const projects = [
        {
          id: 1,
          title: 'E-commerce Site',
          description: 'Built a full-stack e-commerce platform',
          tech: 'React, Node.js, MongoDB',
          year: '2023'
        },
        {
          id: 2,
          title: 'Blog Application',
          description: 'Created a blog app with user authentication',
          tech: 'JavaScript, Express, PostgreSQL',
          year: '2022'
        }
      ];

      const handleNavClick = (section) => {
        setActiveNav(section);
        // Smooth scroll to section
        const element = document.getElementById(section);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
        }
      };

      const toggleProjectDetails = (projectId) => {
        setExpandedProject(expandedProject === projectId ? null : projectId);
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        setSuccessMessage(true);
        setFormData({ email: '', message: '' });
        setTimeout(() => setSuccessMessage(false), 3000);
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({
          ...prev,
          [name]: value
        }));
      };

      return (
        <div className="container">
          <aside className="sidebar">
            <h3>Menu</h3>
            <nav>
              <a 
                href="#about" 
                className={activeNav === 'about' ? 'active' : ''}
                onClick={() => handleNavClick('about')}
              >
                About
              </a>
              <a 
                href="#skills"
                className={activeNav === 'skills' ? 'active' : ''}
                onClick={() => handleNavClick('skills')}
              >
                Skills
              </a>
              <a 
                href="#projects"
                className={activeNav === 'projects' ? 'active' : ''}
                onClick={() => handleNavClick('projects')}
              >
                Projects
              </a>
              <a 
                href="#contact"
                className={activeNav === 'contact' ? 'active' : ''}
                onClick={() => handleNavClick('contact')}
              >
                Contact
              </a>
            </nav>
          </aside>

          <main className="content">
            <header className="hero">
              <h1>John Doe</h1>
              <p className="subtitle">Web Developer</p>
            </header>

            <section id="about">
              <h2>About Me</h2>
              <p>I am a web developer with 5 years of experience building websites and web applications. I specialize in modern web technologies and creating responsive, user-friendly interfaces.</p>
            </section>

            <section id="skills">
              <h2>Skills</h2>
              <div className="skills-grid">
                {skills.map((skill, index) => (
                  <div key={index} className="skill-card">
                    {skill}
                  </div>
                ))}
              </div>
            </section>

            <section id="projects">
              <h2>Projects</h2>
              <div className="projects-grid">
                {projects.map((project) => (
                  <div key={project.id} className="project-card">
                    <h3>{project.title}</h3>
                    <p>{project.description}</p>
                    <button 
                      className="toggle-button"
                      onClick={() => toggleProjectDetails(project.id)}
                    >
                      {expandedProject === project.id ? '[Hide details]' : '[Show details]'}
                    </button>
                    {expandedProject === project.id && (
                      <div className="project-details">
                        <p><strong>Technologies:</strong> {project.tech}</p>
                        <p><strong>Year:</strong> {project.year}</p>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </section>

            <section id="contact">
              <h2>Contact</h2>
              <form onSubmit={handleFormSubmit}>
                <input 
                  type="email" 
                  placeholder="Your email"
                  name="email"
                  value={formData.email}
                  onChange={handleInputChange}
                  required
                />
                <textarea 
                  placeholder="Your message"
                  name="message"
                  rows="4"
                  value={formData.message}
                  onChange={handleInputChange}
                  required
                ></textarea>
                <button type="submit">Send Message</button>
                {successMessage && (
                  <div className="success-message">
                    ✓ Message sent successfully!
                  </div>
                )}
              </form>
              <p style={{ marginTop: '20px' }}>Email: john@example.com</p>
              <p>Phone: (555) 123-4567</p>
            </section>

            <footer>
              <p>© 2024 John Doe. All rights reserved.</p>
            </footer>
          </main>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
